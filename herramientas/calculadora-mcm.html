<section class="course-header container">

<span class="pill">Herramientas</span>
<h1>Calculadora mcm</h1>
<p>Selecciona cuántos números quieres introducir y calcula su mínimo común múltiplo.</p>

</div>

<main>
<section class="section">
<div class="container tool-calculator-shell">
<article class="tool-calculator-card reveal is-visible" data-number-tool="mcm">
<form class="tool-calculator-form">
<div class="tool-calculator-field tool-count-field">
<label for="cantidadNumeros">Cantidad de números</label>
<input id="cantidadNumeros" max="10" min="2" name="cantidadNumeros" step="1" type="number" value="2"/>
</div>
<div class="tool-numbers-grid" data-number-inputs="">
<div class="tool-calculator-field">
<label for="numero1">Número 1</label>
<input id="numero1" min="1" name="numero1" placeholder="Escribe el número 1" step="1" type="number"/>
</div>
<div class="tool-calculator-field">
<label for="numero2">Número 2</label>
<input id="numero2" min="1" name="numero2" placeholder="Escribe el número 2" step="1" type="number"/>
</div>
</div>
<div class="quiz-actions">
<button class="btn btn-primary" type="submit">Calcular mcm</button>
</div>
</form>
<div aria-live="polite" class="tool-calculator-result"></div>
</article>
</div>
